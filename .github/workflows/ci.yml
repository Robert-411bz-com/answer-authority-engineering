name: CI Guardrails
on:
  push:
    branches: [main, cleanslate-v2]
  pull_request:
    branches: [main]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run CI Guardrails (8 checks)
        run: bash scripts/ci-guardrails.sh
      - name: Verify file count
        run: |
          COUNT=$(find workers -name "index.ts" -type f | wc -l)
          echo "Worker count: $COUNT"
          if [ "$COUNT" -lt 13 ]; then
            echo "FAIL: Expected at least 13 workers, found $COUNT"
            exit 1
          fi
      - name: Verify shared-authority-core exports
        run: |
          EXPORTS=$(grep -c "export" shared-authority-core/src/index.ts || echo 0)
          echo "Shared core exports: $EXPORTS"
          if [ "$EXPORTS" -lt 10 ]; then
            echo "FAIL: Expected at least 10 exports in shared core barrel"
            exit 1
          fi
