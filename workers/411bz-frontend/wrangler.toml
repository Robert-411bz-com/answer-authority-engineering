# 411bz-frontend — CANONICAL wrangler.toml
#
# D1 binding name: DB (not OBSERVATORY_DB)
# Auth secret:     TOKEN_SIGNING_SECRET (set via wrangler secret put)
# Email secrets:   EMAIL_API_KEY, EMAIL_FROM (optional, for magic links)

name = "411bz-frontend"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "0a99972e989785e2bf99eb4bef63dd21"
workers_dev = true

# ── Service bindings (zero-hop internal routing) ──

[[services]]
binding = "ENGINE"
service = "411bz-authority-engine"

[[services]]
binding = "ORCHESTRATOR"
service = "411bz-orchestrator"

[[services]]
binding = "OBSERVATORY"
service = "411bz-observatory"

[[services]]
binding = "BOSS_AI"
service = "411bz-boss-ai"

[[services]]
binding = "STRIPE"
service = "411bz-stripe"

# ── Environment variables ──

[vars]
ENVIRONMENT = "production"
WORKER_ID = "411bz-frontend"
FRONTEND_HOST = "https://411bz-frontend.bob-0a9.workers.dev"

# ── D1 database (observatory-production) ──
# Used for: auth_codes, observatory_sessions, observatory_tenant_users

[[d1_databases]]
binding = "DB"
database_name = "observatory-production"
database_id = "762433fd-4dbe-444d-b41c-fdf7f54b5595"

# ── Observability ──

[observability.logs]
enabled = true

# ── Secrets (set via wrangler secret put) ──
# AUTHORITY_INTERNAL_KEY  — service-to-service auth key
# TOKEN_SIGNING_SECRET    — HMAC key for __411bz_token cookies
# EMAIL_API_KEY           — Resend API key (optional, for magic links)
# EMAIL_FROM              — Sender address (optional, for magic links)
